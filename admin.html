<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Red Colaborativa</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        .select-rol { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: #f7fafc; font-size: 13px; max-width: 140px; width: 100%; }
        .btn-status { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; min-width: 100px; }
        .btn-active { background: #e6fffa; color: var(--success); border: 1px solid #b2f5ea; }
        .btn-suspended { background: #fff5f5; color: var(--danger); border: 1px solid #fed7d7; }
        @media (max-width: 768px) {
            .listado-table thead { display: none; }
            #usersTableBody tr { display: block; margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; background: var(--bg-card); }
            #usersTableBody td { display: flex; justify-content: space-between; border: none; padding: 8px 4px; }
            #usersTableBody td::before { content: attr(data-label); font-weight: 600; color: var(--text-muted); margin-right: 12px; }
        }
    </style>
</head>
<body>
    <nav class="sidebar" id="app-sidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Gobernanza de la Red</h1>
            <p>Administración de credenciales, roles y accesos de entidades colaboradoras.</p>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3>Miembros e instituciones vinculadas</h3>
            </div>
            <div class="panel-body panel-body-flush">
                <div style="overflow-x: auto;">
                    <table class="listado-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Organización</th>
                                <th>Teléfono</th>
                                <th>Rol</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="5" class="text-muted" style="text-align:center; padding:30px;">Cargando padrón...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
