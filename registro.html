<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Red Colaborativa</title>
    <link rel="stylesheet" href="css/app.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/></svg>
                    <h1>Unirse a la Red</h1>
                    <p>Creá una cuenta para tu organización o veterinaria</p>
                </div>

                <div id="alert" class="alert alert-danger"></div>
                <div id="success" class="alert alert-success"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" required placeholder="Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="organizacion">Organización / Veterinaria</label>
                        <input type="text" id="organizacion" required placeholder="Fundación Patitas">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono de contacto</label>
                        <input type="tel" id="telefono" required placeholder="11 2345-6789">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" required placeholder="contacto@entidad.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                            <button type="button" id="btnTogglePassword" class="toggle-password">
                                <i id="eyeIcon" data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Solicitar registro</button>
                </form>

                <p class="form-hint" style="text-align:center; margin-top:14px;">
                    Una vez aprobada tu cuenta, podés completar tu perfil con foto, redes y más datos de contacto.
                </p>

                <div class="auth-footer">
                    ¿Ya formás parte? <a href="index.html">Iniciá sesión</a>
                </div>

                <div id="cafecitoAuth"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('cafecitoAuth').innerHTML = renderAuthCafecito();

        if (typeof emailjs !== 'undefined') emailjs.init('4lUPQo1047qOFaEAC');

        const btnTogglePassword = document.getElementById('btnTogglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        btnTogglePassword.addEventListener('click', () => {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            eyeIcon.setAttribute('data-lucide', passwordInput.type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertDiv = document.getElementById('alert');
            const successDiv = document.getElementById('success');
            alertDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const data = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                nombre: document.getElementById('nombre').value.trim(),
                organizacion: document.getElementById('organizacion').value.trim(),
                telefono: document.getElementById('telefono').value.trim()
            };

            const { error } = await registerUser(data);

            if (error) {
                alertDiv.style.display = 'block';
                alertDiv.textContent = error.message;
            } else {
                successDiv.style.display = 'block';
                successDiv.textContent = '¡Solicitud recibida! Te notificaremos cuando el administrador valide tu cuenta.';
                document.getElementById('registerForm').reset();
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
