<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Red Colaborativa</title>
    <link rel="stylesheet" href="css/app.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/><path d="m9 12 2 2 4-4"/></svg>
                    <h1>Red Colaborativa</h1>
                    <p>Base de datos unificada de adopciones</p>
                </div>

                <div id="alert" class="alert alert-danger"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" required placeholder="ejemplo@organizacion.org">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required placeholder="••••••••">
                            <button type="button" id="btnTogglePassword" class="toggle-password" title="Mostrar/ocultar contraseña">
                                <i data-lucide="eye" id="eyeIcon" style="width: 20px; height: 20px;"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Iniciar sesión</button>
                </form>

                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" id="btnOlvideClave" style="color: var(--primary-light); text-decoration: none; font-size: 0.9rem;">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="auth-footer">
                    ¿Tu organización no tiene cuenta? <a href="registro.html">Registrate acá</a>
                </div>

                <div id="cafecitoAuth"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('cafecitoAuth').innerHTML = renderAuthCafecito();

        const btnTogglePassword = document.getElementById('btnTogglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        btnTogglePassword.addEventListener('click', () => {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            eyeIcon.setAttribute('data-lucide', passwordInput.type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');
            alertDiv.style.display = 'none';

            const { data, error } = await loginUser(email, password);

            if (error) {
                alertDiv.style.display = 'block';
                alertDiv.textContent = error.message.includes('Invalid login credentials')
                    ? 'El correo electrónico o la contraseña son incorrectos.'
                    : error.message;
                return;
            }

            if (data?.user) {
                const { data: perfil, error: perfilError } = await window.redSupabase
                    .from('profiles').select('activo').eq('id', data.user.id).single();

                if (perfilError || !perfil?.activo) {
                    await window.redSupabase.auth.signOut();
                    alertDiv.style.display = 'block';
                    alertDiv.textContent = 'Tu solicitud de ingreso aún está siendo revisada por el administrador.';
                    return;
                }
            }

            window.location.href = 'dashboard.html';
        });

        document.getElementById('btnOlvideClave').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Ingresá el correo electrónico de tu cuenta:');
            if (!email?.trim()) return;
            await window.recuperarContrasenaGenerica(email.trim());
        });
    </script>
</body>
</html>
