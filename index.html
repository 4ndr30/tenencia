<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Red de Resguardo Animal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #1e4620;        /* Verde bosque */
            --primary-light: #2c5e2f;
            --accent: #c87a53;         /* Terracota suave */
            --bg-crema: #fdfbf7;       /* Fondo crema */
            --bg-white: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
            --success: #38a169;
            --danger: #e53e3e;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-crema);
            color: var(--text-main);
            line-height: 1.5;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-white);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(30, 70, 32, 0.05);
            border: 1px solid var(--border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: var(--primary);
            font-size: 24px;
            margin-top: 10px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            background-color: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--bg-white);
            box-shadow: 0 0 0 3px rgba(30, 70, 32, 0.1);
        }

        /* AJUSTE PARA CONTENER EL BOTÓN DEL OJITO */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .btn-toggle-eye {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            padding: 4px;
            transition: color 0.2s;
        }

        .btn-toggle-eye:hover {
            color: var(--primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--bg-white);
        }

        .btn-primary:hover {
            background-color: var(--primary-light);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }
        .alert-danger { background: #fff5f5; color: var(--danger); border: 1px solid #fed7d7; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i data-lucide="shield-check" style="width: 48px; height: 48px; color: var(--primary);"></i>
                <h1>Red Colaborativa</h1>
                <p>Base de datos unificada de adopciones</p>
            </div>

            <div id="alert" class="alert alert-danger"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="ejemplo@organizacion.org">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" id="btnTogglePassword" class="btn-toggle-eye" title="Mostrar/ocultar contraseña">
                            <i data-lucide="eye" id="eyeIcon" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>

            <div class="auth-footer">
                ¿Tu organización no tiene cuenta? <a href="registro.html">Registrate acá</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();

        // CORRECCIÓN DIRECTA EN LA VARIABLE DEL OJITO
        const btnTogglePassword = document.getElementById('btnTogglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        btnTogglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');
            
            alertDiv.style.display = 'none';
            
            const { data, error } = await loginUser(email, password);
            
            if (error) {
                alertDiv.style.display = 'block';
                if (error.message.includes("Invalid login credentials")) {
                    alertDiv.textContent = "El correo electrónico o la contraseña son incorrectos.";
                } else {
                    alertDiv.textContent = error.message;
                }
                return;
            }

            // CONTROL ADICIONAL DE ESTADO DE AUDITORÍA DESDE LA BASE DE DATOS
            // Si el login fue correcto en Supabase Auth, verificamos si su perfil fue aprobado en 'profiles'
            if (data && data.user) {
                const { data: perfil, error: perfilError } = await window.redSupabase
                    .from('profiles')
                    .select('activo')
                    .eq('id', data.user.id)
                    .single();

                if (perfilError || !perfil || !perfil.activo) {
                    // Si no está activo, lo deslogueamos inmediatamente y le avisamos
                    await window.redSupabase.auth.signOut();
                    alertDiv.style.display = 'block';
                    alertDiv.textContent = "Tu solicitud de ingreso aún está siendo revisada por el administrador. Te enviaremos un correo apenas sea validada.";
                    return;
                }
            }

            // Si está todo correcto, avanza al panel principal
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
