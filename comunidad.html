<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red de Contactos - Red Colaborativa</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="sidebar" id="app-sidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Red de Contactos</h1>
            <p>Directorio opcional de organizaciones y rescatistas. Cada miembro elige qué datos compartir desde Mi Perfil.</p>
        </div>

        <div class="search-box">
            <div class="search-group">
                <input type="text" id="txtFiltroMiembros" placeholder="Buscar por nombre, organización o bio...">
                <button class="btn btn-secondary" id="btnRefreshMiembros">Actualizar</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3>Miembros de la red</h3>
                <span class="pagination-info" id="lblTotalMiembros">—</span>
            </div>
            <div class="panel-body">
                <div id="membersGrid" class="members-grid">
                    <div class="empty-state"><p>Cargando...</p></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/comunidad.js"></script>
</body>
</html>
